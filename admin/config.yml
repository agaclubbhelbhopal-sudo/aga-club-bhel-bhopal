backend:
  name: git-gateway
  branch: main

local_backend: false
publish_mode: simple
media_folder: "images"
public_folder: "images"

site_url: "/"
display_url: "/"
logo_url: "/images/aga_club_logo.jpg"

collections:
  - name: "site_content"
    label: "Website Content"
    files:
      - name: "main_content"
        label: "All Website Pages"
        file: "content.json"
        editor:
          preview: false
        fields:
          - { label: "Registration Number", name: "registrationNumber", widget: "string", required: false }
          - { label: "Left Logo", name: "logo", widget: "file", required: false }
          - { label: "Right Logo", name: "logo2", widget: "file", required: false }
          - label: "Homepage"
            name: "homepage"
            widget: "object"
            fields:
              - label: "Header"
                name: "header"
                widget: "object"
                fields:
                  - { label: "Title", name: "title", widget: "string" }
                  - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
                  - { label: "Hero Background Image / GIF / Video", name: "backgroundImage", widget: "file", required: false }
                  - label: "Hero Slideshow Images / GIF / Videos"
                    name: "backgroundSlideshow"
                    widget: "list"
                    required: false
                    hint: "Add, delete, or reorder hero slideshow media for the Home page."
                    field: { label: "Image", name: "image", widget: "file" }
              - label: "Leader Messages"
                name: "leaders"
                widget: "list"
                summary: "{{fields.name}} - {{fields.messageTitle}}"
                fields:
                  - { label: "ID", name: "id", widget: "number", value_type: "int", required: false }
                  - { label: "Name", name: "name", widget: "string" }
                  - { label: "Photo", name: "photo", widget: "file", required: false }
                  - { label: "Message Title", name: "messageTitle", widget: "string", required: false }
                  - { label: "Short Message", name: "message", widget: "text", required: false }
                  - { label: "Full Message", name: "fullMessage", widget: "text", required: false }
              - label: "Homepage Gallery"
                name: "gallery"
                widget: "list"
                summary: "{{fields.alt}}"
                fields:
                  - { label: "ID", name: "id", widget: "number", value_type: "int", required: false }
                  - { label: "Image", name: "image", widget: "file" }
                  - { label: "Alt Text", name: "alt", widget: "string", required: false }
          - label: "Past Events"
            name: "pastEvents"
            widget: "list"
            summary: "{{fields.name}} - {{fields.date}}"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int", required: false }
              - { label: "Display Order (admin only)", name: "serialNo", widget: "number", value_type: "int", required: false }
              - { label: "Event Name", name: "name", widget: "string" }
              - { label: "Date", name: "date", widget: "string", required: false }
              - { label: "Venue", name: "venue", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Main Image", name: "image", widget: "file", required: false }
              - label: "Slideshow Images"
                name: "slideshowImages"
                widget: "list"
                required: false
                field: { label: "Image", name: "image", widget: "file" }
          - label: "Committee Members"
            name: "committeeMembers"
            widget: "list"
            summary: "{{fields.name}} - {{fields.position}}"
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int", required: false }
              - { label: "Display Order (admin only)", name: "serialNo", widget: "number", value_type: "int", required: false }
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Position", name: "position", widget: "string", required: false }
              - { label: "Photo", name: "image", widget: "file", required: false }
          - label: "About Page"
            name: "aboutContent"
            widget: "object"
            fields:
              - { label: "Hero Background Image / GIF / Video", name: "backgroundImage", widget: "file", required: false }
              - label: "Hero Slideshow Images / GIF / Videos"
                name: "backgroundSlideshow"
                widget: "list"
                required: false
                hint: "Add, delete, or reorder hero slideshow media for the About page."
                field: { label: "Image", name: "image", widget: "file" }
              - { label: "Story", name: "story", widget: "text", required: false }
              - { label: "Mission", name: "mission", widget: "text", required: false }
              - { label: "Vision", name: "vision", widget: "text", required: false }
              - { label: "Join Us", name: "joinUs", widget: "text", required: false }
          - label: "Contact Page"
            name: "contactContent"
            widget: "object"
            fields:
              - { label: "Hero Background Image / GIF / Video", name: "backgroundImage", widget: "file", required: false }
              - label: "Hero Slideshow Images / GIF / Videos"
                name: "backgroundSlideshow"
                widget: "list"
                required: false
                hint: "Add, delete, or reorder hero slideshow media for the Contact page."
                field: { label: "Image", name: "image", widget: "file" }
              - { label: "Address", name: "address", widget: "text", required: false }
              - { label: "Phone", name: "phone", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "Office Hours", name: "hours", widget: "string", required: false }
              - { label: "Location Details", name: "location", widget: "text", required: false }
          - label: "Committee Page Hero"
            name: "committeeContent"
            widget: "object"
            fields:
              - { label: "Hero Background Image / GIF / Video", name: "backgroundImage", widget: "file", required: false }
              - label: "Hero Slideshow Images / GIF / Videos"
                name: "backgroundSlideshow"
                widget: "list"
                required: false
                hint: "Add, delete, or reorder hero slideshow media for the Committee page."
                field: { label: "Image", name: "image", widget: "file" }
          - label: "Events Page Hero and Settings"
            name: "eventsContent"
            widget: "object"
            fields:
              - { label: "Hero Background Image / GIF / Video", name: "backgroundImage", widget: "file", required: false }
              - label: "Hero Slideshow Images / GIF / Videos"
                name: "backgroundSlideshow"
                widget: "list"
                required: false
                hint: "Add, delete, or reorder hero slideshow media for the Past Events page."
                field: { label: "Image", name: "image", widget: "file" }
              - label: "Past Events Order"
                name: "pastEventsSortOrder"
                widget: "select"
                required: false
                default: "lastOnTop"
                options:
                  - { label: "Last Added On Top", value: "lastOnTop" }
                  - { label: "First Added On Top", value: "firstOnTop" }
              - { label: "Slideshow Container Size Increase", name: "slideshowContainerSizeIncrease", widget: "string", required: false }
              - label: "Event Directory Rules"
                name: "eventDirectories"
                widget: "list"
                required: false
                fields:
                  - { label: "Folder", name: "dir", widget: "string", required: false }
                  - { label: "Name", name: "name", widget: "string", required: false }
                  - { label: "File Prefix", name: "prefix", widget: "string", required: false }
          - label: "Upcoming Events Page Hero"
            name: "upcomingContent"
            widget: "object"
            fields:
              - { label: "Hero Background Image / GIF / Video", name: "backgroundImage", widget: "file", required: false }
              - label: "Hero Slideshow Images / GIF / Videos"
                name: "backgroundSlideshow"
                widget: "list"
                required: false
                hint: "Add, delete, or reorder hero slideshow media for the Upcoming Events page."
                field: { label: "Image", name: "image", widget: "file" }
          - label: "Upcoming Events List - Add/Edit/Delete"
            name: "upcomingEvents"
            widget: "list"
            label_singular: "Upcoming Event"
            summary: "{{fields.name}} - {{fields.date}}"
            required: false
            allow_add: true
            collapsed: false
            hint: "Yahan se Upcoming Events page ke event cards add, edit, delete karen."
            fields:
              - { label: "ID", name: "id", widget: "number", value_type: "int", required: false, hint: "Blank chhod sakte hain." }
              - { label: "Display Order (admin only)", name: "serialNo", widget: "number", value_type: "int", required: false }
              - { label: "Event Name", name: "name", widget: "string" }
              - { label: "Date", name: "date", widget: "string", required: false }
              - { label: "Venue", name: "venue", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text", required: false }
              - { label: "Registration/Form Link", name: "formLink", widget: "string", required: false }
              - { label: "Main Image / GIF / Video", name: "image", widget: "file", required: false }
          - label: "Membership Page Hero"
            name: "membershipContent"
            widget: "object"
            fields:
              - { label: "Hero Background Image / GIF / Video", name: "backgroundImage", widget: "file", required: false }
              - label: "Hero Slideshow Images / GIF / Videos"
                name: "backgroundSlideshow"
                widget: "list"
                required: false
                hint: "Add, delete, or reorder hero slideshow media for the Membership page."
                field: { label: "Image", name: "image", widget: "file" }
          - label: "Members"
            name: "members"
            widget: "list"
            required: false
            summary: "{{fields.Name}}"
            fields:
              - { label: "Sl. No.", name: "Sl. No.", widget: "number", value_type: "int", required: false }
              - { label: "Staff No.", name: "Staff No.", widget: "string", required: false }
              - { label: "Name", name: "Name", widget: "string" }
              - { label: "Contact No.", name: "Contact No.", widget: "string", required: false }
              - { label: "Department", name: "Department", widget: "string", required: false }
