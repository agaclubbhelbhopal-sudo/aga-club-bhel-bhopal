<!DOCTYPE html>
<html>
<head>
    <title>Resize Favicon</title>
</head>
<body>
    <h1>Resize Favicon</h1>
    <canvas id="canvas" width="50" height="50"></canvas>
    <br><br>
    <a id="downloadLink" style="display:none;">Download Resized Image</a>
    
    <script>
        // Load the image
        const img = new Image();
        img.crossOrigin = "Anonymous";
        img.src = 'images/aga_club_site.jpg';
        
        img.onload = function() {
            // Draw the image on canvas with 50x50 dimensions
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw resized image
            ctx.drawImage(img, 0, 0, 50, 50);
            
            // Create download link
            const downloadLink = document.getElementById('downloadLink');
            downloadLink.href = canvas.toDataURL('image/jpeg');
            downloadLink.download = 'favicon.jpg';
            downloadLink.textContent = 'Download Resized Favicon (50x50)';
            downloadLink.style.display = 'inline-block';
            
            console.log('Image resized to 50x50 pixels');
        };
        
        img.onerror = function() {
            console.error('Failed to load image');
        };
    </script>
</body>
</html>
